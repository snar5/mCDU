<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mCDU Display</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="cdu-outer">
    <div id="cdu-grid"></div>
  </div>

  <div id="overlay-disconnected">
    <p id="overlay-status">Connecting to bridge&hellip;</p>
    <p id="ws-address" class="ws-address"></p>
    <form id="ws-form">
      <input id="ws-input" type="text" placeholder="ws://host:8765" spellcheck="false">
      <button type="submit">Connect</button>
    </form>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
